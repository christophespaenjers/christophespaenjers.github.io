name: Compile CV

on:
  push:
    paths:
      - 'cv.tex'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cv.tex

      - name: Commit PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cv.pdf
          git diff --cached --quiet || git commit -m "Auto-compile cv.pdf from cv.tex"
          git push
